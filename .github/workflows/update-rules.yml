name: Update rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  update-tailscale-derp-rules:
    name: Update Tailscale Derp rules
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: scripts/*.py
      - name: Update Tailscale Derp rules
        run: uv run --python 3.12 --script scripts/update-TailscaleDerp.py
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automatic update rules - ${{ steps.date.outputs.date }}"
