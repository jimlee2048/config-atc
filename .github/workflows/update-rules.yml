name: Update rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: read

jobs:
  update-tailscale-derp-rules:
    name: Update Tailscale Derp rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: scripts/*.py
      - name: Update Tailscale Derp rules
        run: uv run --python 3.12 --script scripts/update-TailscaleDerp.py
      - name: Stage generated rule artifact
        run: |
          mkdir -p .artifacts/tailscale-derp-rules
          cp clash/rules/TailscaleDerp*.list clash/rules/TailscaleDerp*.yaml .artifacts/tailscale-derp-rules/
      - name: Upload generated rule artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-derp-rules
          path: .artifacts/tailscale-derp-rules/*

  commit-generated-rules:
    name: Commit generated rules
    runs-on: ubuntu-latest
    needs:
      - update-tailscale-derp-rules
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download generated rule artifacts
        uses: actions/download-artifact@v5
        with:
          name: tailscale-derp-rules
          path: .generated/tailscale-derp-rules
      - name: Apply generated rule artifacts
        run: cp .generated/tailscale-derp-rules/* clash/rules/
      - name: Commit generated rule updates
        run: |
          git add clash/rules/TailscaleDerp*.list clash/rules/TailscaleDerp*.yaml

          if git diff --cached --quiet; then
            echo "No generated rule changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Automatic update rules - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
